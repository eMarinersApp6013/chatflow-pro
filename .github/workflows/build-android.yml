name: Build Android APK

on:
  push:
    branches:
      - claude/setup-expo-typescript-XN4x1
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (EAS Preview)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create or link EAS project
        run: eas init --force --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Print result
        run: echo "Build submitted to EAS. Download at https://expo.dev/accounts/emarinersapp6013/projects/chatflow-pro/builds"
