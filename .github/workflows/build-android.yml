name: Build Android APK

on:
  push:
    branches:
      - claude/setup-expo-typescript-XN4x1
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (EAS Preview)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Install EAS CLI directly (no expo-github-action wrapper needed)
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      # Verify token works
      - name: Verify Expo login
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # Link this repo to an EAS project (creates one if it doesn't exist)
      - name: Initialize EAS project
        run: eas init --non-interactive --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # Submit the build — --no-wait means it returns immediately
      # Check progress at expo.dev/accounts/emarinersapp6013/projects/chatflow-pro/builds
      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build submitted!
        run: |
          echo "======================================"
          echo "✅ Build submitted to EAS servers!"
          echo "Download APK in ~15 min from:"
          echo "https://expo.dev/accounts/emarinersapp6013/projects/chatflow-pro/builds"
          echo "======================================"
