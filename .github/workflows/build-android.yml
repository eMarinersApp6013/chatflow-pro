name: Build Android APK (Direct Gradle)

on:
  push:
    branches:
      - main
      - claude/setup-expo-typescript-XN4x1
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_DOTENV: 1

      # WatermelonDB uses a native SQLite module whose Java classes must be
      # kept by R8/ProGuard — otherwise they are stripped in release builds
      # and the app crashes silently on launch (no error shown to the user).
      - name: Add ProGuard rules for WatermelonDB
        run: |
          cat >> android/app/proguard-rules.pro << 'EOF'

          # WatermelonDB — keep all native module classes so R8 doesn't strip them
          -keep class com.nozbe.watermelondb.** { *; }
          -keepclassmembers class com.nozbe.watermelondb.** { *; }
          -dontwarn com.nozbe.watermelondb.**
          EOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Lint runs before the APK build. assembleRelease uses -x lint so this is
      # the single authoritative lint execution. abortOnError is true by default
      # in Android Gradle — the step fails on Error/Fatal severity issues only;
      # warnings are reported but do not break the build.
      - name: Run Android Lint
        run: cd android && ./gradlew lintRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx3g"

      # Upload even when lint fails so the report is always downloadable
      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android/app/build/reports/lint-results-release.html
          retention-days: 3

      # Generate a keystore for signing (reuse across builds via secret, or generate fresh each time for test builds)
      - name: Generate debug keystore for signing
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/app/release.keystore \
            -alias chatflowpro \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass chatflow2026 \
            -keypass chatflow2026 \
            -dname "CN=ChatFlow Pro, OU=Mobile, O=NodeSurge, L=India, S=India, C=IN"

      # Configure release signing in gradle.properties
      - name: Configure signing
        run: |
          cat >> android/gradle.properties << 'EOF'
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=chatflowpro
          MYAPP_RELEASE_STORE_PASSWORD=chatflow2026
          MYAPP_RELEASE_KEY_PASSWORD=chatflow2026
          EOF

      # Patch app/build.gradle to use the signing config
      - name: Patch build.gradle with signing config
        run: |
          cd android
          # Insert signingConfigs block and wire it into release buildType
          sed -i '/android {/a\
              signingConfigs {\
                  release {\
                      storeFile file(MYAPP_RELEASE_STORE_FILE)\
                      storePassword MYAPP_RELEASE_STORE_PASSWORD\
                      keyAlias MYAPP_RELEASE_KEY_ALIAS\
                      keyPassword MYAPP_RELEASE_KEY_PASSWORD\
                  }\
              }' app/build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' app/build.gradle

      - name: Build Release APK (JS bundled inside)
        run: cd android && ./gradlew assembleRelease --no-daemon -x lint
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx3g"

      - name: Upload APK artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ChatFlowPro
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 3

      - name: Done!
        run: |
          echo "=================================================="
          echo "✅ APK built and signed successfully!"
          echo "Download: Actions tab → this run → Artifacts → ChatFlowPro"
          echo "=================================================="
