name: Build Android APK (Direct Gradle)

on:
  push:
    branches:
      - main
      - claude/setup-expo-typescript-XN4x1
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_DOTENV: 1

      # WatermelonDB uses a native SQLite module whose Java classes must be
      # kept by R8/ProGuard — otherwise they are stripped in release builds
      # and the app crashes silently on launch (no error shown to the user).
      - name: Add ProGuard rules for WatermelonDB
        run: |
          cat >> android/app/proguard-rules.pro << 'EOF'

          # WatermelonDB — keep all native module classes so R8 doesn't strip them
          -keep class com.nozbe.watermelondb.** { *; }
          -keepclassmembers class com.nozbe.watermelondb.** { *; }
          -dontwarn com.nozbe.watermelondb.**
          EOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Lint runs before the APK build. assembleRelease uses -x lint so this is
      # the single authoritative lint execution. abortOnError is true by default
      # in Android Gradle — the step fails on Error/Fatal severity issues only;
      # warnings are reported but do not break the build.
      - name: Run Android Lint
        run: cd android && ./gradlew lintRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx3g"

      # Upload even when lint fails so the report is always downloadable
      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android/app/build/reports/lint-results-release.html
          retention-days: 3

      # Unit tests run after lint but before the APK build. A non-zero exit
      # code from any test failure causes Gradle to exit non-zero, failing this
      # step and stopping the APK build from running on broken code.
      - name: Run unit tests
        run: cd android && ./gradlew test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx3g"

      # Upload even when tests fail so results are always available for review
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: android/app/build/reports/tests/
          retention-days: 3

      # Generate a keystore for signing (reuse across builds via secret, or generate fresh each time for test builds)
      - name: Generate debug keystore for signing
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/app/release.keystore \
            -alias chatflowpro \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass chatflow2026 \
            -keypass chatflow2026 \
            -dname "CN=ChatFlow Pro, OU=Mobile, O=NodeSurge, L=India, S=India, C=IN"

      # Configure release signing in gradle.properties
      - name: Configure signing
        run: |
          cat >> android/gradle.properties << 'EOF'
          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=chatflowpro
          MYAPP_RELEASE_STORE_PASSWORD=chatflow2026
          MYAPP_RELEASE_KEY_PASSWORD=chatflow2026
          EOF

      # Patch app/build.gradle to use the signing config
      - name: Patch build.gradle with signing config
        run: |
          cd android
          # Insert signingConfigs block and wire it into release buildType
          sed -i '/android {/a\
              signingConfigs {\
                  release {\
                      storeFile file(MYAPP_RELEASE_STORE_FILE)\
                      storePassword MYAPP_RELEASE_STORE_PASSWORD\
                      keyAlias MYAPP_RELEASE_KEY_ALIAS\
                      keyPassword MYAPP_RELEASE_KEY_PASSWORD\
                  }\
              }' app/build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' app/build.gradle

      - name: Build Release APK (JS bundled inside)
        run: cd android && ./gradlew assembleRelease --no-daemon -x lint
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Xmx3g"

      - name: Upload APK artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ChatFlowPro
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 3

      - name: Done!
        run: |
          echo "=================================================="
          echo "✅ APK built and signed successfully!"
          echo "Download: Actions tab → this run → Artifacts → ChatFlowPro"
          echo "=================================================="

  firebase-test-lab:
    name: Firebase Test Lab (3 real devices)
    runs-on: ubuntu-latest
    # Only run after a successful APK build, and only on main — Test Lab
    # costs money so we never run it on feature branches.
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      # The APK was already uploaded as an artifact by the build job.
      # Download it here so we can pass it to Firebase Test Lab.
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: ChatFlowPro
          path: apk/

      # Authenticate using the service account JSON stored in GitHub Secrets.
      # See FIREBASE_SETUP.md at the repo root for how to create this secret.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # Robo test crawls the app automatically — no test code required.
      # Three real physical devices are chosen to cover:
      #   oriole  = Pixel 6   (Android 12 / API 31) — modern flagship
      #   redfin  = Pixel 5   (Android 11 / API 30) — previous gen
      #   flame   = Pixel 4   (Android 10 / API 29) — older baseline
      # Results (videos, logcat, crash screenshots) are stored in the
      # project's default Firebase Storage bucket and emailed to all
      # project members automatically (configure in Firebase Console →
      # Test Lab → Notifications).
      - name: Run Robo test on 3 real devices
        run: |
          gcloud firebase test android run \
            --type robo \
            --app apk/app-release.apk \
            --device model=oriole,version=31,locale=en,orientation=portrait \
            --device model=redfin,version=30,locale=en,orientation=portrait \
            --device model=flame,version=29,locale=en,orientation=portrait \
            --results-bucket gs://${{ secrets.FIREBASE_PROJECT_ID }}.appspot.com \
            --results-dir "run-${{ github.run_id }}-${{ github.sha }}" \
            --robo-directives ignore:com.google.android.gms.ads=true \
            --timeout 5m \
            --project ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Upload Firebase Test Lab results summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-test-results
          # gcloud writes a local JUnit XML summary alongside the remote bucket results
          path: |
            **/test-results/firebase/
          retention-days: 3
